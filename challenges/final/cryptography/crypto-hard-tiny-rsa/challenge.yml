name: Криптография Hard: маленький RSA
category: Cryptography
difficulty: hard-but-fair
points: 300
description: |
  Намеренно маленький экземпляр RSA. Разложите n на множители и расшифруйте блочный ciphertext.
flags:
  - edu_ctf{tiny_rsa_done}
hints:
  - text: "Модуль намеренно достаточно мал для пробного деления."
    cost: 30
  - text: "После факторизации n вычислите phi и обратный элемент к e по модулю phi."
    cost: 60
  - text: "Расшифруйте каждый целочисленный блок через pow(c, d, n), затем преобразуйте 4-байтовые блоки обратно в текст."
    cost: 90
files:
