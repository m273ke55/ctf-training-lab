name: "Средняя задача Cryptography: repeating XOR"
category: Cryptography
difficulty: medium
points: 200
description: |
  Флаг зашифрован коротким repeating-key XOR. Используйте известный префикс flag, чтобы восстановить ключ.
flags:
  - edu_ctf{xor_key_found}
hints:
  - text: "Часть plaintext уже известна из формата флага."
    cost: 20
  - text: "Восстановите байты ключа через ciphertext_byte XOR known_plaintext_byte."
    cost: 40
  - text: "Попробуйте длины ключа от 3 до 5 и расшифруйте кандидаты, которые начинаются с edu_ctf{."
    cost: 70
files:
  - dist/ciphertext.hex
  - dist/note.txt
tags:
  - cryptography
  - xor
  - known-plaintext
