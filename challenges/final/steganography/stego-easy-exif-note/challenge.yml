name: "Простая задача Steganography: заметка в метаданных"
category: Steganography
difficulty: easy
points: 100
description: |
  Комментарий JPEG похож на метаданные изображения и содержит скрытую заметку.
flags:
  - edu_ctf{exif_note_seen}
hints:
