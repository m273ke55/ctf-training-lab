<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Utility</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; color: #1f2937; }
        main { max-width: 700px; margin: 60px auto; padding: 24px; background: white; border-radius: 10px; box-shadow: 0 5px 20px #d8dee9; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { box-sizing: border-box; width: 100%; padding: 11px; border: 1px solid #aab3c2; border-radius: 5px; }
        button { width: 100%; padding: 11px; margin-top: 12px; border: 0; border-radius: 5px; background: #2563eb; color: white; cursor: pointer; }
        .result { margin-top: 22px; background: #eef2f7; padding: 14px; border-radius: 5px; overflow-wrap: anywhere; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
<main>
    <h1>Ping Utility</h1>
    <form method="post">
        <label for="ip">IP-адрес или хост</label>
        <input type="text" id="ip" name="ip" placeholder="Например: 127.0.0.1" required>
        <button type="submit">Ping</button>
    </form>
    {% if result %}<section class="result"><h2>Результат</h2><pre>{{ result }}</pre></section>{% endif %}
</main>
</body>
</html>
